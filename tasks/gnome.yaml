---
- name: Install GNOME
  community.general.pacman:
    name:
      - baobab
      - gdm
      - gnome-backgrounds
      - gnome-calculator
      - gnome-clocks
      - gnome-color-manager
      - gnome-control-center
      - gnome-font-viewer
      - gnome-keyring
      - gnome-session
      - gnome-settings-daemon
      - gnome-shell
      - gnome-system-monitor
      - gnome-text-editor
      - gnome-user-docs
      - gnome-weather
      - gvfs
      - loupe
      - nautilus
      - papers
      - quodlibet
      - seahorse
      - shotwell
      - simple-scan
      - snapshot
      - sound-juicer
      - soundconverter
      - xdg-desktop-portal-gnome
      - xdg-user-dirs-gtk
    state: present

- name: Install GNOME Optionals
  community.general.pacman:
    name:
      - gst-libav
      - gst-plugins-bad
      - gst-plugins-ulgy
      - gvfs-afc
      - gvfs-mtp
      - gvfs-nfs
      - gvfs-smb
    state: present
    reason: dependency

- name: Enable GDM
  ansible.builtin.systemd:
    name: gdm.service
    enabled: true
