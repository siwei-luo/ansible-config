---
- name: Install Tools
  community.general.pacman:
    name:
      - alsa-utils
      - arch-audit
      - bind
      - btrfs-progs
      - dosfstools
      - e2fsprogs
      - exfatprogs
      - f2fs-tools
      - go
      - gptfdisk
      - ipcalc
      - lshw
      - nmap
      - openbsd-netcat
      - powertop
      - restic
      - usbutils
      - vim
      - wireguard-tools
      - wol
    state: present

- name: Configure /etc/skel/.vimrc
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/tools/vimrc.j2"
    dest: /etc/skel/.vimrc
    owner: root
    group: root
    mode: "0644"
