# Initial configuration as in: https://wiki.archlinux.org/title/Installation_guide#Configure_the_system
# Only necessary to be executed once.
---
- name: Configure /etc/localtime
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ localtime }}"
    dest: /etc/localtime
    owner: root
    group: root
    state: link

- name: Configure /etc/locale.gen
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/baseline/locale.gen.j2"
    dest: /etc/locale.gen
    owner: root
    group: root
    mode: "0644"
  register: _localegen

- name: Generate Locales
  ansible.builtin.shell:
    cmd: locale-gen
  when: _localegen.changed

- name: Configure /etc/locale.conf
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/baseline/locale.conf.j2"
    dest: /etc/locale.conf
    owner: root
    group: root
    mode: "0644"

- name: Configure /etc/vconsole.conf
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/baseline/vconsole.conf.j2"
    dest: /etc/vconsole.conf
    owner: root
    group: root
    mode: "0644"

- name: Configure /etc/hostname
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/baseline/hostname.j2"
    dest: /etc/hostname
    owner: root
    group: root
    mode: "0644"

- name: Check Bootloader
  ansible.builtin.stat:
    path: /boot/loader/random-seed
  register: _bootloader

- name: Install Bootloader
  ansible.builtin.shell:
    cmd: bootctl install
  when: _bootloader.stat.exists == False
  notify: Reminder root password
