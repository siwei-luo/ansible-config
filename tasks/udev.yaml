---
- name: Configure /etc/udev/rules.d
  ansible.builtin.file:
    path: /etc/udev/rules.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure `/etc/udev/rules.d/*`
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/udev/rules.d/{{ item | basename | regex_replace('\\.j2', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ lookup('fileglob', playbook_dir + '/templates/udev/*.rules.j2', wantlist=True) }}"
  notify: Reload udev
